name: release-binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to upload assets to"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: service-impact-linux-x86_64
            archive_ext: tar.gz
          - os: macos-latest
            asset_name: service-impact-macos
            archive_ext: tar.gz
          - os: windows-latest
            asset_name: service-impact-windows-x86_64
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build binary
        run: cargo build --release --bin service-impact
      - name: Package archive (unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.asset_name }}.${{ matrix.archive_ext }} -C target/release service-impact
      - name: Package archive (windows)
        if: runner.os == 'Windows'
        run: powershell -Command "Compress-Archive -Path target/release/service-impact.exe -DestinationPath ${{ matrix.asset_name }}.${{ matrix.archive_ext }}"
      - name: Upload release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="${INPUT_TAG_NAME}"
          fi
          gh release upload "${TAG_NAME}" "${{ matrix.asset_name }}.${{ matrix.archive_ext }}" --repo "${GITHUB_REPOSITORY}" --clobber
