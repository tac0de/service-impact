name: service-impact-example

on:
  pull_request:

jobs:
  impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Collect changed paths
        run: git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_paths.txt

      - name: Validate registry
        run: cargo run --bin service-impact -- validate --registry registry.json --fail-on-warnings

      - name: Compute impact
        run: >
          cargo run --bin service-impact -- impact
          --registry registry.json
          --service api
          --changed-paths-file changed_paths.txt
          --mode conservative
